{{- if .Values.haproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "valkey.fullname" . }}-haproxy
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
    app.kubernetes.io/component: haproxy
spec:
  replicas: {{ .Values.haproxy.replicas }}
  selector:
    matchLabels:
      {{- include "valkey.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: haproxy
  template:
    metadata:
      labels:
        {{- include "valkey.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: haproxy
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/haproxy-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      serviceAccountName: {{ include "valkey.serviceAccountName" . }}
      {{- (include "valkey.imagePullSecrets" .) | nindent 6 }}
      {{- with .Values.haproxy.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: haproxy
          {{- if .Values.haproxy.image.registry }}
          image: "{{ .Values.haproxy.image.registry }}/{{ .Values.haproxy.image.repository }}:{{ .Values.haproxy.image.tag }}"
          {{- else }}
          image: "{{ .Values.haproxy.image.repository }}:{{ .Values.haproxy.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.haproxy.image.pullPolicy }}
          command:
            - /bin/sh
            - /config/entrypoint.sh
          ports:
            - name: valkey-write
              containerPort: {{ .Values.haproxy.service.port | default 6379 }}
              protocol: TCP
            - name: valkey-read
              containerPort: {{ .Values.haproxy.service.readPort | default 6380 }}
              protocol: TCP
          startupProbe:
            {{- include "valkey.probe.haproxy" (dict "root" . "config" .Values.haproxy.probes.startup) | nindent 12 }}
          livenessProbe:
            {{- include "valkey.probe.haproxy" (dict "root" . "config" .Values.haproxy.probes.liveness) | nindent 12 }}
          {{- if .Values.haproxy.probes.readiness.enabled }}
          readinessProbe:
            {{- include "valkey.probe.haproxy" (dict "root" . "config" .Values.haproxy.probes.readiness) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: haproxy-config
              mountPath: /config
            {{- if .Values.tls.enabled }}
            - name: {{ include "valkey.fullname" . }}-tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- if .Values.auth.enabled }}
            {{- if .Values.auth.usersExistingSecret }}
            - name: valkey-users-secret
              mountPath: /valkey-users-secret
              readOnly: true
            {{- else }}
            - name: valkey-auth-secret
              mountPath: /valkey-auth-secret
              readOnly: true
            {{- end }}
            {{- end }}
            {{- with .Values.haproxy.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.haproxy.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.haproxy.securityContext | nindent 12 }}

      volumes:
        - name: haproxy-config
          configMap:
            name: {{ include "valkey.fullname" . }}-haproxy
            defaultMode: 0755
        {{- if .Values.tls.enabled }}
        - name: {{ include "valkey.fullname" . }}-tls
          secret:
            secretName: {{ required "An existing secret is required to enable TLS" .Values.tls.existingSecret }}
            defaultMode: 0444
        {{- end }}
        {{- if .Values.auth.enabled }}
        {{- if .Values.auth.usersExistingSecret }}
        - name: valkey-users-secret
          secret:
            secretName: {{ .Values.auth.usersExistingSecret }}
        {{- else }}
        - name: valkey-auth-secret
          secret:
            secretName: {{ include "valkey.fullname" . }}-auth
        {{- end }}
        {{- end }}
        {{- with .Values.haproxy.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
